<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>상담 신청 완료 | 오토리스너</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="./styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-730686317"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-730686317');
      gtag('config', 'AW-16607986905');
    </script>
    <style>
      .thank-you-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: #f5f7fb;
      }

      .thank-you-card {
        width: min(640px, 100%);
        padding: 48px 32px;
        border: 1px solid #dfe5ef;
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(30, 52, 86, 0.12);
        text-align: center;
      }

      .thank-you-card img {
        width: min(270px, 72%);
        height: auto;
        margin-bottom: 30px;
      }

      .thank-you-card h1 {
        margin: 0 0 14px;
        font-size: clamp(28px, 5vw, 42px);
        color: #17243a;
      }

      .thank-you-card p {
        margin: 0 0 28px;
        color: #53627a;
        line-height: 1.7;
      }

      .thank-you-card a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        border-radius: 999px;
        background: #1769e0;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="thank-you-page">
      <section class="thank-you-card" aria-labelledby="thank-you-title">
        <img src="./assets/autoleasener-logo.png" alt="AUTO LEASENER">
        <h1 id="thank-you-title">상담 신청이 완료되었습니다.</h1>
        <p>남겨주신 차량과 이용 조건을 확인한 뒤 빠르게 연락드리겠습니다.</p>
        <a href="./">홈으로 돌아가기</a>
      </section>
    </main>
  </body>
</html>
